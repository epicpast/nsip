<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="paper" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#334" surfaceScale="1.0" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0.8" k2="0.3" k3="0.1" k4="0"/>
    </filter>
  </defs>

  <!-- Night sky background -->
  <rect width="1280" height="640" fill="#1a1a2e"/>
  <rect width="1280" height="640" fill="#1a1a2e" opacity="0.9" filter="url(#paper)"/>

  <!-- Moon -->
  <circle cx="1080" cy="120" r="55" fill="#F5F5DC" opacity="0.9"/>
  <circle cx="1060" cy="110" r="50" fill="#1a1a2e" opacity="0.3"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="100" cy="60" r="2"/><circle cx="250" cy="40" r="1.5"/>
    <circle cx="400" cy="80" r="2"/><circle cx="550" cy="30" r="1.5"/>
    <circle cx="700" cy="55" r="2"/><circle cx="850" cy="45" r="1.8"/>
    <circle cx="180" cy="150" r="1.5"/><circle cx="350" cy="130" r="2"/>
    <circle cx="500" cy="110" r="1.5"/><circle cx="750" cy="140" r="1.8"/>
    <circle cx="950" cy="70" r="1.5"/><circle cx="1200" cy="90" r="2"/>
    <circle cx="50" cy="120" r="1.8"/><circle cx="630" cy="160" r="1.5"/>
    <circle cx="1150" cy="170" r="2"/><circle cx="300" cy="180" r="1.5"/>
  </g>

  <!-- Rolling hills - dark green -->
  <ellipse cx="640" cy="680" rx="900" ry="320" fill="#1B5E20"/>
  <ellipse cx="300" cy="700" rx="600" ry="280" fill="#2E7D32"/>
  <ellipse cx="1000" cy="720" rx="500" ry="300" fill="#1B5E20"/>

  <!-- Fence posts -->
  <g fill="#5D4037" stroke="#4E342E" stroke-width="2">
    <rect x="80" y="340" width="12" height="80" rx="2"/>
    <rect x="200" y="350" width="12" height="75" rx="2"/>
    <rect x="320" y="345" width="12" height="78" rx="2"/>
    <rect x="440" y="355" width="12" height="72" rx="2"/>
  </g>
  <g stroke="#6D4C41" stroke-width="3" fill="none" opacity="0.6">
    <line x1="86" y1="360" x2="206" y2="370"/>
    <line x1="206" y1="370" x2="326" y2="365"/>
    <line x1="326" y1="365" x2="446" y2="375"/>
    <line x1="86" y1="380" x2="206" y2="390"/>
    <line x1="206" y1="390" x2="326" y2="385"/>
    <line x1="326" y1="385" x2="446" y2="395"/>
  </g>

  <!-- Sheep 1 (large, front) -->
  <g transform="translate(700, 380)">
    <rect x="-60" y="-30" width="120" height="70" rx="30" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="2"/>
    <circle cx="-40" cy="-30" r="18" fill="#D5D5D5"/>
    <circle cx="-10" cy="-35" r="20" fill="#E0E0E0"/>
    <circle cx="25" cy="-32" r="18" fill="#D5D5D5"/>
    <circle cx="50" cy="-28" r="16" fill="#E0E0E0"/>
    <circle cx="-50" cy="-15" r="15" fill="#D5D5D5"/>
    <circle cx="55" cy="-10" r="14" fill="#D5D5D5"/>
    <rect x="-85" y="-25" width="35" height="40" rx="8" fill="#2c2c2c"/>
    <circle cx="-72" cy="-10" r="5" fill="#E0E0E0"/>
    <circle cx="-72" cy="-10" r="2.5" fill="#111"/>
    <ellipse cx="-90" cy="-28" rx="8" ry="12" fill="#3a3a3a" transform="rotate(-15,-90,-28)"/>
    <ellipse cx="-62" cy="-30" rx="8" ry="12" fill="#3a3a3a" transform="rotate(15,-62,-30)"/>
    <rect x="-40" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="-20" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="20" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="40" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
  </g>

  <!-- Sheep 2 (medium, behind) -->
  <g transform="translate(520, 350) scale(0.8)">
    <rect x="-60" y="-30" width="120" height="70" rx="30" fill="#D5D5D5" stroke="#BDBDBD" stroke-width="2"/>
    <circle cx="-40" cy="-30" r="18" fill="#C8C8C8"/>
    <circle cx="-10" cy="-35" r="20" fill="#D5D5D5"/>
    <circle cx="25" cy="-32" r="18" fill="#C8C8C8"/>
    <circle cx="50" cy="-28" r="16" fill="#D5D5D5"/>
    <rect x="-85" y="-25" width="35" height="40" rx="8" fill="#2c2c2c"/>
    <circle cx="-72" cy="-10" r="5" fill="#E0E0E0"/>
    <circle cx="-72" cy="-10" r="2.5" fill="#111"/>
    <ellipse cx="-90" cy="-28" rx="8" ry="12" fill="#3a3a3a" transform="rotate(-15,-90,-28)"/>
    <ellipse cx="-62" cy="-30" rx="8" ry="12" fill="#3a3a3a" transform="rotate(15,-62,-30)"/>
    <rect x="-40" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="-20" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="20" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="40" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
  </g>

  <!-- Sheep 3 (small, far back) -->
  <g transform="translate(900, 340) scale(0.6)">
    <rect x="-60" y="-30" width="120" height="70" rx="30" fill="#D5D5D5" stroke="#BDBDBD" stroke-width="2"/>
    <circle cx="-40" cy="-30" r="18" fill="#C8C8C8"/>
    <circle cx="-10" cy="-35" r="20" fill="#D5D5D5"/>
    <circle cx="25" cy="-32" r="18" fill="#C8C8C8"/>
    <rect x="-85" y="-25" width="35" height="40" rx="8" fill="#2c2c2c"/>
    <circle cx="-72" cy="-10" r="5" fill="#E0E0E0"/>
    <circle cx="-72" cy="-10" r="2.5" fill="#111"/>
    <rect x="-40" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="-20" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="20" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
    <rect x="40" y="35" width="10" height="35" rx="3" fill="#2c2c2c"/>
  </g>

  <!-- Lamb (tiny, next to sheep 1) -->
  <g transform="translate(800, 430) scale(0.45)">
    <rect x="-50" y="-25" width="100" height="55" rx="25" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="2"/>
    <circle cx="-30" cy="-25" r="14" fill="#D5D5D5"/>
    <circle cx="0" cy="-28" r="15" fill="#E0E0E0"/>
    <circle cx="30" cy="-25" r="14" fill="#D5D5D5"/>
    <rect x="-72" y="-20" width="30" height="32" rx="7" fill="#2c2c2c"/>
    <circle cx="-60" cy="-8" r="4" fill="#E0E0E0"/>
    <circle cx="-60" cy="-8" r="2" fill="#111"/>
    <rect x="-30" y="26" width="8" height="28" rx="3" fill="#2c2c2c"/>
    <rect x="-12" y="26" width="8" height="28" rx="3" fill="#2c2c2c"/>
    <rect x="12" y="26" width="8" height="28" rx="3" fill="#2c2c2c"/>
    <rect x="30" y="26" width="8" height="28" rx="3" fill="#2c2c2c"/>
  </g>

  <!-- Title text background strip -->
  <rect x="0" y="530" width="1280" height="110" fill="rgba(0,0,0,0.5)" rx="0"/>

  <!-- Title text -->
  <text x="640" y="575" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#FFFFFF" letter-spacing="4">
    nsip
  </text>
  <text x="640" y="615" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#A5D6A7" letter-spacing="2">
    Sheep Genetic Evaluation Tools
  </text>
</svg>
