---
name: "Copilot Setup Steps"

"on": workflow_dispatch

jobs:
  copilot-setup-steps:
    name: Copilot coding agent environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo registry
        # v5.0.3
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-copilot-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-copilot-

      - name: Install cargo-deny
        # v2.67.25
        uses: taiki-e/install-action@288875dd3d64326724fa6d9593062d9f8ba0b131
        with:
          tool: cargo-deny

      - name: Fetch dependencies
        run: cargo fetch

      - name: Build nsip binary
        run: cargo build --release

      - name: Add nsip to PATH
        run: echo "${GITHUB_WORKSPACE}/target/release" >> "${GITHUB_PATH}"
