---
name: ADR Viewer

"on":
  push:
    branches: [main, master]
    paths:
      - 'docs/adr/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    name: Generate HTML Viewer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate ADR HTML
        # main
        uses: zircote/adrscope@15b8b2658badb6ee22bc1cac797dcb503dd0c2a5
        with:
          command: html
          input-dir: docs/adr
          output: adr-viewer

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: adr-viewer
          path: adr-viewer/
          retention-days: 90

# To enable GitHub Pages deployment, see:
# https://github.com/zircote/adrscope#github-pages-deployment
