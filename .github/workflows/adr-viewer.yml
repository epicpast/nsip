---
name: ADR Viewer

"on":
  push:
    branches: [main, master]
    paths:
      - 'docs/adr/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    name: Generate HTML Viewer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate ADR HTML
        # main
        uses: zircote/adrscope@f5b56af9f5ebe72a480770ff9389fcc46345cb66
        with:
          command: html
          adr-path: docs/adr
          output-path: adr-viewer

      - name: Upload artifact
        # v4.6.0
        uses: actions/upload-artifact@ea3f73d3e6f8268b4a40da165a72ca6a06e37770
        with:
          name: adr-viewer
          path: adr-viewer/
          retention-days: 90

# To enable GitHub Pages deployment, see:
# https://github.com/zircote/adrscope#github-pages-deployment
