---
name: Changelog

"on":
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Base changelog branch on develop
        # The changelog PR targets develop, so generate on top of develop (not
        # the tag commit on main). Otherwise the branch carries main↔develop
        # CHANGELOG differences and conflicts as develop evolves.
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin develop
          git checkout -B "chore/changelog-${TAG_NAME}" origin/develop

      - name: Generate changelog
        # yamllint disable-line rule:line-length
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.5.0
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet CHANGELOG.md 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open and merge changelog PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          BRANCH="chore/changelog-${TAG_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit; nothing to do."
            exit 0
          fi
          git commit -m "docs: update CHANGELOG.md for ${TAG_NAME}"

          # The branch is based on origin/develop (see "Base changelog branch on
          # develop"), so this is a clean diff; force-with-lease in case a prior
          # run left a stale branch.
          git push --force-with-lease origin "${BRANCH}"

          TITLE="docs: update CHANGELOG.md for ${TAG_NAME}"
          BODY="Auto-generated changelog update for ${TAG_NAME}."

          PR_NUMBER="$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' || true)"
          if [ -z "${PR_NUMBER}" ]; then
            PR_NUMBER="$(gh pr create --title "${TITLE}" --body "${BODY}" \
              --base develop --head "${BRANCH}" | grep -oE '[0-9]+$' || true)"
          else
            gh pr edit "${PR_NUMBER}" --title "${TITLE}" --body "${BODY}"
          fi

          # Merge immediately so changelog PRs never accumulate and conflict
          # across releases. Non-blocking: a merge failure must not fail the
          # release pipeline.
          if [ -n "${PR_NUMBER}" ]; then
            gh pr merge "${PR_NUMBER}" --merge --delete-branch || \
              echo "::warning::changelog PR #${PR_NUMBER} could not be auto-merged; merge it manually."
          fi
