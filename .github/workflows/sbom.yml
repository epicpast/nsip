---
name: SBOM Generation

"on":
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable

      - name: Install cargo-sbom
        # v2.67.18
        uses: taiki-e/install-action@288875dd3d64326724fa6d9593062d9f8ba0b131
        with:
          tool: cargo-sbom

      - name: Generate SBOM (SPDX format)
        run: |
          cargo sbom --output-format spdx_json_2_3 > nsip-sbom-spdx.json

      - name: Upload SBOM artifact
        # v4.6.2
        uses: actions/upload-artifact@ea3f73d3e6f8268b4a40da165a72ca6a06e37770  # v4.6.2
        with:
          name: sbom-spdx
          path: nsip-sbom-spdx.json
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${TAG_NAME}" nsip-sbom-spdx.json
