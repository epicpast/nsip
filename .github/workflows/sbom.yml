---
name: SBOM Generation

"on":
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable

      - name: Install cargo-sbom
        # v2.67.18
        uses: taiki-e/install-action@1c0532667bd5bc37f71fc223a52e7c41c966d9d7
        with:
          tool: cargo-sbom

      - name: Generate SBOM (SPDX format)
        run: |
          cargo sbom --output-format spdx_json_2_3 > sbom-spdx.json

      - name: Upload SBOM artifact
        # v4.6.2
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5
        with:
          name: sbom-spdx
          path: sbom-spdx.json
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${TAG_NAME}" sbom-spdx.json
