---
name: Publish to crates.io

# Disabled by default — this is a template repo, not published to crates.io.
# To enable, uncomment the push trigger and configure CARGO_REGISTRY_TOKEN.
"on":
  # push:
  #   tags:
  #     - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Install Rust toolchain
        # master
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable

      - name: Install cargo-deny
        # v2.67.18
        uses: taiki-e/install-action@1c0532667bd5bc37f71fc223a52e7c41c966d9d7
        with:
          tool: cargo-deny

      - name: Verify package
        run: |
          cargo package --list
          cargo package --allow-dirty

      - name: Run pre-publish checks
        run: |
          cargo fmt -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          cargo doc --no-deps --all-features
          cargo deny check

      - name: Dry run publish
        run: cargo publish --dry-run --allow-dirty

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
