name: Snap Package

# Disabled — requires SNAPCRAFT_TOKEN secret.
# To enable, uncomment the release trigger and configure the secret.
on:
  # release:
  #   types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snap:
    name: Build Snap Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build snap
        uses: snapcore/action-build@3bdaa03e89fbf4598ba4c501055a582c77b6a75a # v1.3.0
        id: build

      - name: Upload snap artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: snap-package
          path: ${{ steps.build.outputs.snap }}
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.2.0
        with:
          files: ${{ steps.build.outputs.snap }}

      - name: Publish to Snap Store
        if: github.event_name == 'release' && github.ref == 'refs/heads/main'
        uses: snapcore/action-publish@2f62f3ca778de25a88f1e29edb6ec4e763e53eef # v1.2.0
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
