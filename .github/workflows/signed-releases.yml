---
name: Signed Releases

"on":
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write
  id-token: write

jobs:
  sign-assets:
    name: Sign Release Assets
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - name: Get tag name
        id: tag
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        # yamllint disable-line rule:line-length
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern '*'

      - name: Sign assets with Cosign
        run: |
          for file in *; do
            if [[ -f "$file" && "$file" != *.sig ]]; then
              echo "Signing $file"
              cosign sign-blob --yes "$file" > "${file}.sig"
            fi
          done

      - name: Generate checksums
        run: |
          sha256sum * | grep -v '\.sig' > SHA256SUMS
          sha512sum * | grep -v '\.sig' > SHA512SUMS

      - name: Sign checksums
        run: |
          cosign sign-blob --yes SHA256SUMS > SHA256SUMS.sig
          cosign sign-blob --yes SHA512SUMS > SHA512SUMS.sig

      - name: Upload signatures
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "${TAG}" \
            --repo "${{ github.repository }}" \
            --clobber \
            *.sig SHA256SUMS SHA512SUMS

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        # yamllint disable rule:line-length
        run: |
          EXISTING=$(gh release view "${TAG}" \
            --repo "${{ github.repository }}" \
            --json body -q .body)

          printf '%s\n' "$EXISTING" > release_notes.md

          cat <<'NOTES' >> release_notes.md
          ## Verification

          All release assets are signed with [Sigstore Cosign](https://github.com/sigstore/cosign).

          ### Verify signatures:

          \`\`\`bash
          # Install cosign
          brew install cosign  # or download from GitHub

          # Verify asset signature
          cosign verify-blob \\
            --signature <file>.sig \\
            --certificate-identity-regexp=".*" \\
            --certificate-oidc-issuer-regexp=".*" \\
            <file>

          # Verify checksums
          sha256sum --check SHA256SUMS
          \`\`\`
          NOTES

          gh release edit "${TAG}" \
            --repo "${{ github.repository }}" \
            --notes-file release_notes.md
        # yamllint enable rule:line-length
