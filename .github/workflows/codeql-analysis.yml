---
name: CodeQL Analysis

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4f5a7c2ca15e7f96ab7a75c2e9b6551ac597da02  # v3.28.1
        with:
          languages: cpp
          # CodeQL uses the cpp extractor for Rust analysis

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          cache-key: codeql

      - name: Build for analysis
        run: cargo build --all-features

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@4f5a7c2ca15e7f96ab7a75c2e9b6551ac597da02  # v3.28.1
        with:
          category: "/language:cpp"
