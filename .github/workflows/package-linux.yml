name: Linux Packages (APT/RPM)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  debian-package:
    name: Build Debian Package (.deb)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          cache-key: deb

      - name: Install cargo-deb
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-deb@2.7.0

      - name: Build release binary
        run: cargo build --release

      - name: Create debian package
        run: cargo deb --no-build --output target/debian/nsip.deb

      - name: Upload debian package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: debian-package
          path: target/debian/*.deb
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.2.0
        with:
          files: target/debian/*.deb

  rpm-package:
    name: Build RPM Package (.rpm)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          cache-key: rpm

      - name: Install cargo-generate-rpm
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-generate-rpm@0.15.1

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/nsip

      - name: Create RPM package
        run: cargo generate-rpm

      - name: Upload RPM package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rpm-package
          path: target/generate-rpm/*.rpm
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.2.0
        with:
          files: target/generate-rpm/*.rpm
