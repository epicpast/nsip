---
name: Homebrew Package

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package'
        required: true
      dry_run:
        description: 'Dry run (do not push)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  homebrew:
    name: Update Homebrew Formula
    runs-on: macos-latest

    steps:
      - name: Checkout homebrew tap
        # yamllint disable-line rule:line-length
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
            VERSION="${VERSION#v}"
          else
            VERSION="$INPUT_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Download source archive
          TARBALL_URL="https://github.com/${REPO}"
          TARBALL_URL="${TARBALL_URL}/archive/refs/tags"
          TARBALL_URL="${TARBALL_URL}/v${VERSION}.tar.gz"
          echo "tarball_url=$TARBALL_URL" >> "$GITHUB_OUTPUT"

          # Calculate SHA256
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        env:
          TARBALL_URL: ${{ steps.release.outputs.tarball_url }}
          SHA256: ${{ steps.release.outputs.sha256 }}
          VERSION: ${{ steps.release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          cat > homebrew-tap/Formula/nsip.rb << FORMULA
          class Nsip < Formula
            desc "Sheep genetic evaluation CLI"
            homepage "https://github.com/${REPO}"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "MIT"
            version "${VERSION}"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match version.to_s,
                shell_output("#{bin}/nsip --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        if: github.event.inputs.dry_run != 'true'
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"

          git add Formula/nsip.rb
          git commit -m "nsip: update to ${VERSION}"
          git push

      - name: Show formula (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "Generated formula (dry run - not pushed):"
          cat homebrew-tap/Formula/nsip.rb
