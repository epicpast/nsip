---
name: Homebrew Package

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package'
        required: true
      dry_run:
        description: 'Dry run (do not push)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  homebrew:
    name: Update Homebrew Formulas
    runs-on: macos-latest
    environment: copilot

    steps:
      - name: Checkout homebrew tap
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
            VERSION="${VERSION#v}"
          else
            VERSION="$INPUT_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          BASE="https://github.com/${REPO}/releases"
          BASE="${BASE}/download/v${VERSION}"

          # Binary URLs
          ARM64_URL="${BASE}/nsip-macos-arm64"
          AMD64_URL="${BASE}/nsip-macos-amd64"
          LINUX_URL="${BASE}/nsip-linux-amd64"
          COMP_URL="${BASE}/nsip-completions.tar.gz"
          MAN_URL="${BASE}/nsip-man-pages.tar.gz"

          # Source tarball URL
          SRC_URL="https://github.com/${REPO}"
          SRC_URL="${SRC_URL}/archive/refs/tags"
          SRC_URL="${SRC_URL}/v${VERSION}.tar.gz"

          # Compute SHA256 for all assets
          ARM64_SHA=$(curl -sL "$ARM64_URL" \
            | shasum -a 256 | awk '{print $1}')
          AMD64_SHA=$(curl -sL "$AMD64_URL" \
            | shasum -a 256 | awk '{print $1}')
          LINUX_SHA=$(curl -sL "$LINUX_URL" \
            | shasum -a 256 | awk '{print $1}')
          COMP_SHA=$(curl -sL "$COMP_URL" \
            | shasum -a 256 | awk '{print $1}')
          MAN_SHA=$(curl -sL "$MAN_URL" \
            | shasum -a 256 | awk '{print $1}')
          SRC_SHA=$(curl -sL "$SRC_URL" \
            | shasum -a 256 | awk '{print $1}')

          for key in arm64 amd64 linux comp man src; do
            eval "echo \"${key}_url=\$$(echo ${key} \
              | tr '[:lower:]' '[:upper:]')_URL\"" \
              >> "$GITHUB_OUTPUT"
            eval "echo \"${key}_sha=\$$(echo ${key} \
              | tr '[:lower:]' '[:upper:]')_SHA\"" \
              >> "$GITHUB_OUTPUT"
          done

      - name: Generate binary formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          REPO: ${{ github.repository }}
          ARM64_URL: ${{ steps.release.outputs.arm64_url }}
          AMD64_URL: ${{ steps.release.outputs.amd64_url }}
          LINUX_URL: ${{ steps.release.outputs.linux_url }}
          COMP_URL: ${{ steps.release.outputs.comp_url }}
          MAN_URL: ${{ steps.release.outputs.man_url }}
          ARM64_SHA: ${{ steps.release.outputs.arm64_sha }}
          AMD64_SHA: ${{ steps.release.outputs.amd64_sha }}
          LINUX_SHA: ${{ steps.release.outputs.linux_sha }}
          COMP_SHA: ${{ steps.release.outputs.comp_sha }}
          MAN_SHA: ${{ steps.release.outputs.man_sha }}
        run: |
          cat > homebrew-tap/Formula/nsip.rb << FORMULA
          class Nsip < Formula
            desc "Sheep genetic evaluation CLI"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${ARM64_URL}"
                sha256 "${ARM64_SHA}"
              else
                url "${AMD64_URL}"
                sha256 "${AMD64_SHA}"
              end
            end

            on_linux do
              url "${LINUX_URL}"
              sha256 "${LINUX_SHA}"
            end

            resource "completions" do
              url "${COMP_URL}"
              sha256 "${COMP_SHA}"
            end

            resource "man-pages" do
              url "${MAN_URL}"
              sha256 "${MAN_SHA}"
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "nsip-macos-arm64" => "nsip"
                else
                  bin.install "nsip-macos-amd64" => "nsip"
                end
              elsif OS.linux?
                bin.install "nsip-linux-amd64" => "nsip"
              end

              resource("completions").stage do
                bash_completion.install "nsip.bash" => "nsip"
                zsh_completion.install "_nsip"
                fish_completion.install "nsip.fish"
              end

              resource("man-pages").stage do
                man1.install Dir["*.1"]
              end
            end

            test do
              assert_match version.to_s,
                shell_output("#{bin}/nsip --version")
            end
          end
          FORMULA

      - name: Generate source formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          REPO: ${{ github.repository }}
          SRC_URL: ${{ steps.release.outputs.src_url }}
          SRC_SHA: ${{ steps.release.outputs.src_sha }}
        run: |
          cat > homebrew-tap/Formula/nsip-source.rb << FORMULA
          class NsipSource < Formula
            desc "Sheep genetic evaluation CLI (source)"
            homepage "https://github.com/${REPO}"
            url "${SRC_URL}"
            sha256 "${SRC_SHA}"
            version "${VERSION}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args

              # Generate completions
              out = Utils.safe_popen_read(
                bin/"nsip", "completions", "bash"
              )
              (bash_completion/"nsip").write out

              out = Utils.safe_popen_read(
                bin/"nsip", "completions", "zsh"
              )
              (zsh_completion/"_nsip").write out

              out = Utils.safe_popen_read(
                bin/"nsip", "completions", "fish"
              )
              (fish_completion/"nsip.fish").write out

              # Generate man pages
              system bin/"nsip", "man-pages",
                "--out-dir", man1
            end

            test do
              assert_match version.to_s,
                shell_output("#{bin}/nsip --version")
            end
          end
          FORMULA

      - name: Commit and push formulas
        if: github.event.inputs.dry_run != 'true'
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"

          git add Formula/nsip.rb Formula/nsip-source.rb
          git commit -m "nsip: update to ${VERSION}"
          git push

      - name: Show formulas (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "=== nsip.rb (binary) ==="
          cat homebrew-tap/Formula/nsip.rb
          echo ""
          echo "=== nsip-source.rb (source) ==="
          cat homebrew-tap/Formula/nsip-source.rb
