---
name: Nightly Builds

"on":
  # schedule:
  #   - cron: '0 2 * * *'  # 2 AM daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nsip
            asset_name: nsip-linux-amd64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: nsip
            asset_name: nsip-linux-arm64
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nsip
            asset_name: nsip-macos-amd64
          # macOS aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nsip
            asset_name: nsip-macos-arm64
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nsip.exe
            asset_name: nsip-windows-amd64.exe

    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}
          cache-key: nightly-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: >-
          cargo +nightly build --release --all-features
          --target ${{ matrix.target }}
        env:
          # yamllint disable-line rule:line-length
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = \
               "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip \
              "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          else
            strip \
              "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          fi

      - name: Rename binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
             "${{ matrix.asset_name }}"

      - name: Upload artifact
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  package-nightly:
    name: Package Nightly Release
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all platform binaries
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4.2.2
        with:
          path: server
          merge-multiple: true

      - name: Set binary permissions
        run: chmod +x server/nsip-*

      - name: Inject nightly version into manifest
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y%m%d)"
          VERSION="nightly-${DATE}-${SHORT_SHA}"
          sed -i \
            "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" \
            manifest.json

      - name: Package MCPB bundle
        id: mcpb
        # yamllint disable-line rule:line-length
        uses: zircote/mcp-bundle@902cd0e159b26226a136dc12a2a226457e3bb691  # main
        with:
          upload-artifact: 'true'
          create-release-asset: 'false'

      - name: Delete old nightly release
        run: gh release delete nightly --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old nightly tag
        run: git push origin :refs/tags/nightly || true

      - name: Create nightly release
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            Automated nightly build from latest main branch.

            **Warning:** Nightly builds may be unstable.

            Built from commit: ${{ github.sha }}
          files: |
            server/nsip-linux-amd64
            server/nsip-linux-arm64
            server/nsip-macos-amd64
            server/nsip-macos-arm64
            server/nsip-windows-amd64.exe
            ${{ steps.mcpb.outputs.bundle-path }}
            ${{ steps.mcpb.outputs.bundle-path }}.sha256
