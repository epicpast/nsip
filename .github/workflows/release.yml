---
name: Release

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: copilot
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          # On a manual workflow_dispatch GITHUB_REF is a branch ref, which
          # would poison every versioned asset name (embedded slashes) and the
          # release-upload target. Require a clean vX.Y.Z tag ref.
          if [ "$version" = "$GITHUB_REF" ] || printf '%s' "$version" | grep -q '/'; then
            echo "::error::release.yml must run on a refs/tags/vX.Y.Z ref; got '$GITHUB_REF'" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        # yamllint disable-line rule:line-length
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.5.0
        with:
          config: cliff.toml
          # Strip header AND footer: the footer carries compare-link reference
          # definitions and a generator comment meant for CHANGELOG.md, not the
          # per-release GitHub notes body.
          args: --latest --strip all

      - name: Create GitHub Release
        id: create_release
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          # yamllint disable-line rule:line-length
          prerelease: ${{ contains(steps.get_version.outputs.version, '-alpha') || contains(steps.get_version.outputs.version, '-beta') || contains(steps.get_version.outputs.version, '-rc') }}
        env:
          # Use PAT so release event propagates to
          # downstream workflows (homebrew, sbom)
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  generate-extras:
    name: Generate completions & man pages
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          cache-key: release

      - name: Build release binary
        run: cargo build --release

      - name: Generate shell completions
        run: |
          mkdir -p completions
          ./target/release/nsip completions bash \
            > completions/nsip.bash
          ./target/release/nsip completions zsh \
            > completions/_nsip
          ./target/release/nsip completions fish \
            > completions/nsip.fish
          ./target/release/nsip completions powershell \
            > completions/_nsip.ps1

      - name: Generate man pages
        run: |
          mkdir -p man
          ./target/release/nsip man-pages --out-dir man

      - name: Compute versioned archive names
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          {
            echo "COMP_NAME=nsip-${VERSION}-completions.tar.gz"
            echo "MAN_NAME=nsip-${VERSION}-man-pages.tar.gz"
          } >> "$GITHUB_ENV"

      - name: Package completions
        run: >-
          tar czf "$COMP_NAME"
          -C completions .

      - name: Package man pages
        run: >-
          tar czf "$MAN_NAME" -C man .

      - name: Attest completions archive
        id: attest_completions
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ env.COMP_NAME }}

      - name: Attest man pages archive
        id: attest_man
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ env.MAN_NAME }}

      - name: Rename attestation bundles
        env:
          COMP_BUNDLE: ${{ steps.attest_completions.outputs.bundle-path }}
          MAN_BUNDLE: ${{ steps.attest_man.outputs.bundle-path }}
        run: |
          cp "$COMP_BUNDLE" \
            "${COMP_NAME}.sigstore.json"
          cp "$MAN_BUNDLE" \
            "${MAN_NAME}.sigstore.json"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "$COMP_NAME" \
            "$MAN_NAME" \
            "${COMP_NAME}.sigstore.json" \
            "${MAN_NAME}.sigstore.json" \
            --clobber

  generate-sbom:
    name: Generate SBOM
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          cache-key: sbom

      - name: Install cargo-sbom
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/install-cargo-tool
        with:
          tool: cargo-sbom

      - name: Compute versioned SBOM name
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: echo "SBOM_NAME=nsip-${VERSION}-sbom-spdx.json" >> "$GITHUB_ENV"

      - name: Generate SBOM (SPDX format)
        run: >-
          cargo sbom --output-format spdx_json_2_3
          > "$SBOM_NAME"

      - name: Attest SBOM provenance
        id: attest_sbom
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ env.SBOM_NAME }}

      - name: Rename attestation bundle
        env:
          SBOM_BUNDLE: ${{ steps.attest_sbom.outputs.bundle-path }}
        run: >-
          cp "$SBOM_BUNDLE"
          "${SBOM_NAME}.sigstore.json"

      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "$SBOM_NAME" \
            "${SBOM_NAME}.sigstore.json" \
            --clobber

      - name: Upload SBOM artifact
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.SBOM_NAME }}
          path: ${{ env.SBOM_NAME }}
          retention-days: 90

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nsip
            platform: linux-amd64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: nsip
            platform: linux-arm64
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nsip
            platform: macos-amd64
          # macOS aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nsip
            platform: macos-arm64
          # Windows x86_64 (pinned: deterministic release artifacts)
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: nsip.exe
            platform: windows-amd64.exe

    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Rust with caching
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
          cache-key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: >-
          cargo build --release
          --target ${{ matrix.target }}
        env:
          # yamllint disable-line rule:line-length
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = \
               "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip \
              "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          else
            strip \
              "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          fi

      - name: Compute versioned asset name
        shell: bash
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: echo "ASSET_NAME=nsip-${VERSION}-${PLATFORM}" >> "$GITHUB_ENV"

      - name: Rename binary for release
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
             "$ASSET_NAME"

      - name: Attest binary provenance
        id: attest_binary
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ env.ASSET_NAME }}

      - name: Rename attestation bundle
        shell: bash
        env:
          BUNDLE: ${{ steps.attest_binary.outputs.bundle-path }}
        run: >-
          cp "$BUNDLE" "${ASSET_NAME}.sigstore.json"

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "$ASSET_NAME" \
            "${ASSET_NAME}.sigstore.json" \
            --clobber

      - name: Upload artifact
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  package-mcpb:
    name: Package MCPB Bundle
    needs: [create-release, build-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download platform binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          mkdir -p server
          gh release download "${{ github.ref_name }}" \
            --pattern "nsip-${VERSION}-linux-amd64" \
            --pattern "nsip-${VERSION}-linux-arm64" \
            --pattern "nsip-${VERSION}-macos-amd64" \
            --pattern "nsip-${VERSION}-macos-arm64" \
            --pattern "nsip-${VERSION}-windows-amd64.exe" \
            --dir server
          # manifest.json references unversioned server/nsip-<platform>
          # filenames; rename the versioned release assets back to the
          # names the MCPB bundle expects.
          for platform in linux-amd64 linux-arm64 macos-amd64 \
                          macos-arm64 windows-amd64.exe; do
            mv "server/nsip-${VERSION}-${platform}" \
               "server/nsip-${platform}"
          done

      - name: Set binary permissions
        run: chmod +x server/nsip-*

      - name: Inject version into manifest
        env:
          VERSION: >-
            ${{ needs.create-release.outputs.version }}
        run: >-
          sed -i
          "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/"
          manifest.json

      - name: Package MCPB bundle
        id: mcpb
        # yamllint disable-line rule:line-length
        uses: zircote/mcp-bundle@902cd0e159b26226a136dc12a2a226457e3bb691  # main
        with:
          upload-artifact: 'true'
          create-release-asset: 'false'

      - name: Attest bundle provenance
        id: attest_mcpb
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.mcpb.outputs.bundle-path }}

      - name: Rename attestation bundle
        env:
          MCPB_BUNDLE: >-
            ${{ steps.attest_mcpb.outputs.bundle-path }}
          MCPB_FILE: >-
            ${{ steps.mcpb.outputs.bundle-path }}
        run: >-
          cp "$MCPB_BUNDLE"
          "${MCPB_FILE}.sigstore.json"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MCPB_FILE: ${{ steps.mcpb.outputs.bundle-path }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "$MCPB_FILE" \
            "${MCPB_FILE}.sigstore.json" \
            --clobber
