---
name: Container Security Scan

"on":
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  # schedule:
  #   - cron: "0 0 * * 0"  # Weekly on Sundays
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v6.0.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Docker image for scanning
        run: docker build -t rust-template:scan .

      - name: Run Trivy vulnerability scanner
        # master
        uses: aquasecurity/trivy-action@22438a435773de8c97dc0958cc0b823c45b064ac
        with:
          image-ref: rust-template:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Generate human-readable report
        # master
        uses: aquasecurity/trivy-action@22438a435773de8c97dc0958cc0b823c45b064ac
        with:
          image-ref: rust-template:scan
          format: table
          output: trivy-report.txt

      - name: Upload scan report
        # v4.6.2
        uses: actions/upload-artifact@ea3f73d3e6f8268b4a40da165a72ca6a06e37770  # v4.6.2
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-report.txt
          retention-days: 30
