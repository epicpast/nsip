<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="paper" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#fff" surfaceScale="1.2" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0.8" k2="0.3" k3="0.1" k4="0"/>
    </filter>
  </defs>

  <!-- Sky background - light blue construction paper -->
  <rect width="1280" height="640" fill="#87CEEB" rx="0"/>
  <rect width="1280" height="640" fill="#87CEEB" opacity="0.9" filter="url(#paper)"/>

  <!-- Sun - bright yellow circle with rays -->
  <circle cx="1080" cy="120" r="65" fill="#FFD700" opacity="0.95"/>
  <g stroke="#FFD700" stroke-width="6" opacity="0.7">
    <line x1="1080" y1="30" x2="1080" y2="10"/>
    <line x1="1080" y1="210" x2="1080" y2="230"/>
    <line x1="970" y1="120" x2="950" y2="120"/>
    <line x1="1190" y1="120" x2="1210" y2="120"/>
    <line x1="1005" y1="50" x2="990" y2="35"/>
    <line x1="1155" y1="50" x2="1170" y2="35"/>
    <line x1="1005" y1="190" x2="990" y2="205"/>
    <line x1="1155" y1="190" x2="1170" y2="205"/>
  </g>

  <!-- Clouds - white blobs -->
  <g opacity="0.85">
    <ellipse cx="200" cy="100" rx="80" ry="40" fill="#fff"/>
    <ellipse cx="260" cy="90" rx="60" ry="35" fill="#fff"/>
    <ellipse cx="150" cy="95" rx="55" ry="30" fill="#fff"/>
    <ellipse cx="600" cy="70" rx="70" ry="35" fill="#fff"/>
    <ellipse cx="660" cy="60" rx="55" ry="30" fill="#fff"/>
    <ellipse cx="550" cy="65" rx="50" ry="28" fill="#fff"/>
  </g>

  <!-- Rolling hills - green construction paper -->
  <ellipse cx="640" cy="680" rx="900" ry="320" fill="#4CAF50"/>
  <ellipse cx="300" cy="700" rx="600" ry="280" fill="#66BB6A"/>
  <ellipse cx="1000" cy="720" rx="500" ry="300" fill="#43A047"/>

  <!-- Fence posts -->
  <g fill="#8D6E63" stroke="#6D4C41" stroke-width="2">
    <rect x="80" y="340" width="12" height="80" rx="2"/>
    <rect x="200" y="350" width="12" height="75" rx="2"/>
    <rect x="320" y="345" width="12" height="78" rx="2"/>
    <rect x="440" y="355" width="12" height="72" rx="2"/>
  </g>
  <g stroke="#A1887F" stroke-width="3" fill="none" opacity="0.8">
    <line x1="86" y1="360" x2="206" y2="370"/>
    <line x1="206" y1="370" x2="326" y2="365"/>
    <line x1="326" y1="365" x2="446" y2="375"/>
    <line x1="86" y1="380" x2="206" y2="390"/>
    <line x1="206" y1="390" x2="326" y2="385"/>
    <line x1="326" y1="385" x2="446" y2="395"/>
  </g>

  <!-- Sheep 1 (large, front) - geometric construction paper style -->
  <g transform="translate(700, 380)">
    <!-- Body - fluffy white rectangle with rounded corners -->
    <rect x="-60" y="-30" width="120" height="70" rx="30" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="2"/>
    <!-- Wool bumps -->
    <circle cx="-40" cy="-30" r="18" fill="#F5F5F5"/>
    <circle cx="-10" cy="-35" r="20" fill="#FAFAFA"/>
    <circle cx="25" cy="-32" r="18" fill="#F5F5F5"/>
    <circle cx="50" cy="-28" r="16" fill="#FAFAFA"/>
    <circle cx="-50" cy="-15" r="15" fill="#F5F5F5"/>
    <circle cx="55" cy="-10" r="14" fill="#F5F5F5"/>
    <!-- Head - black rectangle -->
    <rect x="-85" y="-25" width="35" height="40" rx="8" fill="#424242"/>
    <!-- Eyes -->
    <circle cx="-72" cy="-10" r="5" fill="#fff"/>
    <circle cx="-72" cy="-10" r="2.5" fill="#212121"/>
    <!-- Ears -->
    <ellipse cx="-90" cy="-28" rx="8" ry="12" fill="#616161" transform="rotate(-15,-90,-28)"/>
    <ellipse cx="-62" cy="-30" rx="8" ry="12" fill="#616161" transform="rotate(15,-62,-30)"/>
    <!-- Legs - black rectangles -->
    <rect x="-40" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="-20" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="20" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="40" y="35" width="10" height="35" rx="3" fill="#424242"/>
  </g>

  <!-- Sheep 2 (medium, behind) -->
  <g transform="translate(520, 350) scale(0.8)">
    <rect x="-60" y="-30" width="120" height="70" rx="30" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>
    <circle cx="-40" cy="-30" r="18" fill="#EEEEEE"/>
    <circle cx="-10" cy="-35" r="20" fill="#F5F5F5"/>
    <circle cx="25" cy="-32" r="18" fill="#EEEEEE"/>
    <circle cx="50" cy="-28" r="16" fill="#F5F5F5"/>
    <rect x="-85" y="-25" width="35" height="40" rx="8" fill="#424242"/>
    <circle cx="-72" cy="-10" r="5" fill="#fff"/>
    <circle cx="-72" cy="-10" r="2.5" fill="#212121"/>
    <ellipse cx="-90" cy="-28" rx="8" ry="12" fill="#616161" transform="rotate(-15,-90,-28)"/>
    <ellipse cx="-62" cy="-30" rx="8" ry="12" fill="#616161" transform="rotate(15,-62,-30)"/>
    <rect x="-40" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="-20" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="20" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="40" y="35" width="10" height="35" rx="3" fill="#424242"/>
  </g>

  <!-- Sheep 3 (small, far back) -->
  <g transform="translate(900, 340) scale(0.6)">
    <rect x="-60" y="-30" width="120" height="70" rx="30" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>
    <circle cx="-40" cy="-30" r="18" fill="#EEEEEE"/>
    <circle cx="-10" cy="-35" r="20" fill="#F5F5F5"/>
    <circle cx="25" cy="-32" r="18" fill="#EEEEEE"/>
    <rect x="-85" y="-25" width="35" height="40" rx="8" fill="#424242"/>
    <circle cx="-72" cy="-10" r="5" fill="#fff"/>
    <circle cx="-72" cy="-10" r="2.5" fill="#212121"/>
    <rect x="-40" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="-20" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="20" y="35" width="10" height="35" rx="3" fill="#424242"/>
    <rect x="40" y="35" width="10" height="35" rx="3" fill="#424242"/>
  </g>

  <!-- Lamb (tiny, next to sheep 1) -->
  <g transform="translate(800, 430) scale(0.45)">
    <rect x="-50" y="-25" width="100" height="55" rx="25" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="2"/>
    <circle cx="-30" cy="-25" r="14" fill="#F5F5F5"/>
    <circle cx="0" cy="-28" r="15" fill="#FAFAFA"/>
    <circle cx="30" cy="-25" r="14" fill="#F5F5F5"/>
    <rect x="-72" y="-20" width="30" height="32" rx="7" fill="#424242"/>
    <circle cx="-60" cy="-8" r="4" fill="#fff"/>
    <circle cx="-60" cy="-8" r="2" fill="#212121"/>
    <rect x="-30" y="26" width="8" height="28" rx="3" fill="#424242"/>
    <rect x="-12" y="26" width="8" height="28" rx="3" fill="#424242"/>
    <rect x="12" y="26" width="8" height="28" rx="3" fill="#424242"/>
    <rect x="30" y="26" width="8" height="28" rx="3" fill="#424242"/>
  </g>

  <!-- Flowers scattered in grass -->
  <g opacity="0.9">
    <circle cx="150" cy="480" r="6" fill="#FF5722"/>
    <circle cx="155" cy="473" r="5" fill="#FF7043"/>
    <circle cx="300" cy="500" r="5" fill="#FFEB3B"/>
    <circle cx="307" cy="495" r="4" fill="#FFF176"/>
    <circle cx="850" cy="510" r="6" fill="#E91E63"/>
    <circle cx="856" cy="503" r="5" fill="#F48FB1"/>
    <circle cx="1050" cy="470" r="5" fill="#9C27B0"/>
    <circle cx="1056" cy="464" r="4" fill="#CE93D8"/>
    <circle cx="550" cy="520" r="5" fill="#FF9800"/>
    <circle cx="556" cy="514" r="4" fill="#FFB74D"/>
  </g>

  <!-- Title text background strip -->
  <rect x="0" y="530" width="1280" height="110" fill="rgba(0,0,0,0.45)" rx="0"/>

  <!-- Title text -->
  <text x="640" y="575" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#FFFFFF" letter-spacing="4">
    nsip
  </text>
  <text x="640" y="615" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#C8E6C9" letter-spacing="2">
    Sheep Genetic Evaluation Tools
  </text>
</svg>
