# git-cliff configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{commit.scope}}**: {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# Changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# Remove the leading and trailing whitespace from the template
trim = true

[git]
# Parse conventional commits
conventional_commits = true
# Filter commits based on their messages
filter_commits = false
# Tag pattern for releases
tag_pattern = "v[0-9]*"
# Skip tags matching this pattern
skip_tags = "v0.1.0-beta.*"
# Ignore tags matching this pattern
ignore_tags = ""
# Sort tags chronologically
topo_order = false
# Sort commits by oldest first
sort_commits = "oldest"

[git.commit_parsers]
# Conventional Commits parsers
{ message = "^feat", group = "Added" }
{ message = "^fix", group = "Fixed" }
{ message = "^docs", group = "Documentation" }
{ message = "^perf", group = "Performance" }
{ message = "^refactor", group = "Refactored" }
{ message = "^style", group = "Styling" }
{ message = "^test", group = "Testing" }
{ message = "^chore\\(release\\): prepare for", skip = true }
{ message = "^chore", group = "Miscellaneous" }
{ body = ".*security", group = "Security" }
